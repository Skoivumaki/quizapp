version: '3.8'

services:
  quizapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env.production 
    networks:
      - quizapp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/quiz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service with hot reload
  quizapp-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: quizapp-dev
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - .env.local
    networks:
      - quizapp-network
    profiles:
      - dev

networks:
  quizapp-network:
    driver: bridge